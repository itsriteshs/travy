[[servers]]
name = "travy"
package = "uvx::travy-mcp-server"
tools = [
  "maps.search_places",
  "maps.route",
  "weather.lookup",
  "budget.calculate",
  "travel.score_candidates",
  "otari.generate_plan",
]

[api]
addr = "127.0.0.1:8090"
timeout = { read = "120s", write = "120s", shutdown = "30s" }

[mcp]
timeout = { init = "60s", health = "10s" }
interval = { health = "60s" }
